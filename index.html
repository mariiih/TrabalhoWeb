<!DOCTYPE html>
<html lang="pt-br">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas - Organizando a Vida</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1250/1250615.png"> <!-- icone da aba -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
	<!-- Gerenciador de tarefas para organizar as tarefas do dia-a-dia -->
        <h1>Organizando a Vida</h1>
        <nav>
            <button id="listar-todas">Todas as tarefas</button>
            <button id="listar-urgentes">Tarefas urgentes</button>
            <button id="limpar-tudo" class="limpar">Limpar Tudo</button>
        </nav>
    </header>

    <main>
        <form id="escrever-tarefa" onsubmit="event.preventDefault()"> 
            <input type="text" id="tarefa" placeholder="Nova tarefa" required> 
            <select id="prioridade">
                <option value="urgente">Urgente</option>
                <option value="importante">Importante</option>
                <option value="tranquilo">Tranquilo</option>
            </select>
            <input type="date" id="data">
            <input type="time" id="hora">
            
            <button type="button" id="adicionar-tarefa">Adicionar</button>
            <button type="button" id="cancelar-edição" style="display: none; background-color: #555; color: white;">Cancelar</button>
        </form>

        <section id="area-procurar"> 
            <input type="text" id="procurar-tarefa" placeholder="Procurar tarefa...">
            
            <select id="filtrar-tarefa"> <!-- Filtros para ajudar a encontrar tarefas específicas -->
                <option value="">Filtrar por...</option>
                <option value="data">Data e Hora</option>
                <option value="prioridade">Prioridade</option>
                <option value="alfabética">A-Z</option>
                <option value="criacao">Criação</option>
                <option value="atrasadas">Atrasadas</option>
            </select>
        </section>

        <section class="lista-tarefas">
            <article class="coluna">
                <div class="titulo-coluna">
                    <h2>Pendentes</h2> 
                    <span id="contador-pendentes" class="contador">0</span>
                </div>
                <ul id="lista-pendentes"></ul>
            </article>

            <article class="coluna">
                <div class="titulo-coluna">
                    <h2>Em Andamento</h2> 
                    <span id="contador-andamento" class="contador">0</span>
                </div>
                <ul id="lista-andamento"></ul>
            </article>

            <article class="coluna">
                <div class="titulo-coluna">
                    <h2>Concluídas</h2> 
                    <span id="contador-concluidas" class="contador">0</span>
                </div>
                <ul id="lista-concluidas"></ul>
            </article>
        </section>
    </main>

    <footer> 
        <p class="frase-motivacional">Continue a nadar...</p> <!--Coloquei a frase da Dory, pois é uma das frases que me inspiram e que eu sempre falo -->
        </footer>

    <script src="script.js"></script>
</body>
</html>
